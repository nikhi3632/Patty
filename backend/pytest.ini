[pytest]
markers =
    integration: slow tests that hit external APIs (Claude, Supabase)
addopts = -m "not integration"
filterwarnings =
    ignore::DeprecationWarning:fastapi
    ignore::DeprecationWarning:starlette
    ignore::DeprecationWarning:gotrue
    ignore::DeprecationWarning:supabase
    ignore::PendingDeprecationWarning:starlette
